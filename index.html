<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Maressa Santana</title>

    <style>

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #004d5b;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .page-wrap {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
        }

        .active {
            display: flex;
        }

        /* Container que mantém a proporção da imagem */
        .convite-container {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .img-fullscreen {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Áreas clicáveis */
        .area {
            position: absolute;
            cursor: pointer;

            /* DEBUG VISUAL */
            /*background: rgba(255, 0, 0, 0.35);
            /*border: 2px solid red;*/
        }

        /* Posições relativas na imagem */

        .confirmacao {
            left: 18%;
            top: 78%;
            width: 14%;
            height: 12%;
        }

        .dresscode {
            left: 35%;
            top: 78%;
            width: 14%;
            height: 12%;
        }

        .lista {
            left: 52%;
            top: 78%;
            width: 14%;
            height: 12%;
        }

        .localizacao {
            left: 69%;
            top: 78%;
            width: 14%;
            height: 12%;
        }

        .btn-voltar-fixo {
            position: absolute;
            bottom: 40=px;
            left: 20px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 22px;
            font-family: -apple-system, sans-serif;
            cursor: pointer;
            z-index: 100;
        }

        @media (max-width: 600px) {

            .btn-voltar-fixo {
                bottom: 10vh;
                left: 20px;
            }

        }
    </style>
</head>

<body>

    <audio id="musicaConvite" loop>
        <source src="natiruts.mp3" type="audio/mpeg">
    </audio>

    <!-- Página 1 -->

    <div id="p1" class="page-wrap active">

        <div class="convite-container">
            <img src="1.png" class="img-fullscreen" onclick="nextPage(2)">
        </div>

    </div>

    <!-- Página 2 -->

    <div id="p2" class="page-wrap">

        <div class="convite-container">

            <img src="2.png" class="img-fullscreen">

            <!-- Confirmar presença -->
            <div class="area confirmacao"
                onclick="window.location.href='https://wa.me/5561995778499'">
            </div>

            <!-- Dress code -->
            <div class="area dresscode"
                onclick="nextPage(3)">
            </div>

            <!-- Lista de presentes -->
            <div class="area lista"
                onclick="nextPage(4)">
            </div>

            <!-- Localização -->
            <div class="area localizacao"
                onclick="window.open('https://www.google.com/maps/search/Espaco+Lumier')">
            </div>

        </div>


    </div>

    <!-- Página 3 -->

    <div id="p3" class="page-wrap">

        <div class="btn-voltar-fixo" onclick="nextPage(2)">
            <strong>&lt;</strong>
        </div>

        <div class="convite-container">
            <img src="3.png" class="img-fullscreen">
        </div>

    </div>

    <!-- Página 4 -->

    <div id="p4" class="page-wrap">

        <div class="btn-voltar-fixo" onclick="nextPage(2)">
            <strong>&lt;</strong>
        </div>

        <div class="convite-container">
            <img src="4.png" class="img-fullscreen">
        </div>

    </div>

    <script>

        function nextPage(num) {

            const audio = document.getElementById('musicaConvite');

            if (audio) {
                audio.play().catch(() => {});
            }

            document
                .querySelectorAll('.page-wrap')
                .forEach(p => p.classList.remove('active'));

            document
                .getElementById('p' + num)
                .classList.add('active');

            window.scrollTo(0, 0);
        }

    </script>

</body>

</html>
