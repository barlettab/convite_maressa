<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Maressa Santana</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #004d5b; }
        
        .page { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
            position: relative;
        }
        
        .active { display: block; }

        .btn-interativo {
            position: absolute;
            bottom: 15%;      
            height: 9%;     
            cursor: pointer;
            z-index: 9999;   
            display: block;
        }

        a.btn-interativo { text-decoration: none; }

        /* Estilo do novo botão de voltar */
        .btn-voltar {
            position: absolute;
            top: 5%;
            left: 5%;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10000;
            border: 1px solid rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px); /* Efeito de vidro desfocado */
        }
    </style>
</head>
<body>

    <div id="p1" class="page active" style="background-image: url('1.png');" onclick="nextPage(2)"></div>

    <div id="p2" class="page" style="background-image: url('2.png'); position: relative;">
        <div onclick="window.location.href='https://wa.me/5561995778499'" class="btn-interativo" style="left: 27%; width: 11.5%;"></div>
        <div onclick="nextPage(3)" class="btn-interativo" style="left: 40.5%; width: 7%;"></div>
        <div onclick="nextPage(4)" class="btn-interativo" style="left: 50%; width: 10%;"></div>
        <a href="https://www.google.com/search?q=Espaco+Lumier" target="_blank" class="btn-interativo" style="left: 62.5%; width: 8%;"></a>
    </div>

    <div id="p3" class="page" style="background-image: url('3.png');">
        <div class="btn-voltar" onclick="nextPage(2)">← Voltar</div>
    </div>

    <div id="p4" class="page" style="background-image: url('4.png');">
        <div class="btn-voltar" onclick="nextPage(2)">← Voltar</div>
    </div>

    <script>
        function nextPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('p' + num);
            if (target) { target.classList.add('active'); }
        }
    </script>
</body>
</html>
